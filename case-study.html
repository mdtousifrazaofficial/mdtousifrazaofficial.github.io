<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study | MD Tousif Raza</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/motion.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Case Study Hero */
        .cs-hero { padding: 140px 0 60px; border-bottom: 1px solid var(--border-color); }
        .cs-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .cs-meta-item { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .cs-meta-item i { color: var(--accent-primary); margin-right: 6px; }
        .cs-title { font-size: clamp(2rem, 4vw, 3.2rem); margin-bottom: 20px; line-height: 1.2; }
        .cs-summary { font-size: 1.15rem; color: var(--text-secondary); max-width: 700px; line-height: 1.8; }

        /* Case Study Body */
        .cs-body { max-width: 820px; margin: 0 auto; padding: 80px 0 100px; }

        /* Section Block */
        .cs-section { margin-bottom: 64px; }
        .cs-section-label { font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent-primary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .cs-section-label::before { content: '>'; }
        .cs-section h2 { font-size: 1.6rem; margin-bottom: 20px; }
        .cs-section p { font-size: 1.05rem; color: var(--text-secondary); line-height: 1.9; margin-bottom: 16px; }

        /* Highlight Box */
        .cs-highlight { background: var(--bg-card); border: 1px solid var(--border-color); border-left: 4px solid var(--accent-primary); padding: 32px; margin: 32px 0; }
        .cs-highlight.green { border-left-color: var(--accent-teal); }
        .cs-highlight h4 { font-family: var(--font-mono); font-size: 0.9rem; color: var(--accent-primary); margin-bottom: 12px; text-transform: uppercase; }
        .cs-highlight.green h4 { color: var(--accent-teal); }
        .cs-highlight p { margin-bottom: 0; }

        /* Metrics Row */
        .cs-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 24px; margin: 40px 0; }
        .cs-metric { background: var(--bg-card); border: 1px solid var(--border-color); border-top: 2px solid var(--accent-primary); padding: 24px; text-align: center; }
        .cs-metric-val { font-family: var(--font-mono); font-size: 2rem; font-weight: 800; color: var(--accent-primary); margin-bottom: 8px; }
        .cs-metric-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-family: var(--font-mono); letter-spacing: 0.05em; }

        /* Tools Used */
        .cs-tools { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
        .cs-tool { font-family: var(--font-mono); font-size: 0.85rem; padding: 8px 16px; border: 1px solid var(--border-color); color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.05em; }

        /* Process Steps */
        .cs-steps { counter-reset: step; margin: 32px 0; }
        .cs-step { display: flex; gap: 20px; margin-bottom: 28px; align-items: flex-start; }
        .cs-step-num { font-family: var(--font-mono); font-size: 1.4rem; font-weight: 800; color: var(--accent-primary); min-width: 40px; line-height: 1; padding-top: 4px; }
        .cs-step-content h4 { font-size: 1.05rem; margin-bottom: 6px; }
        .cs-step-content p { font-size: 0.95rem; margin-bottom: 0; }

        /* Back Button */
        .cs-back { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); color: var(--text-primary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 0; transition: color 0.3s; }
        .cs-back:hover { color: var(--accent-primary); }

        /* Bottom CTA */
        .cs-cta { text-align: center; padding: 80px 0; border-top: 1px solid var(--border-color); }
        .cs-cta h3 { font-size: 1.5rem; margin-bottom: 24px; }

        /* Carousel Styles */
        .carousel-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: var(--border-color); margin: 0 6px; cursor: pointer; transition: all 0.3s; }
        .carousel-dot.active { background: var(--accent-primary); transform: scale(1.3); box-shadow: 0 0 8px rgba(0,240,255,0.5); }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); border: 1px solid var(--border-color); color: white; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; z-index: 10; transition: all 0.2s; }
        .carousel-btn:hover { background: rgba(0, 240, 255, 0.15); border-color: var(--accent-primary); color: var(--accent-primary); }
        .carousel-btn.prev { left: 16px; }
        .carousel-btn.next { right: 16px; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo glitch-hover">Md Tousif Raza <span class="blink" style="color: var(--accent-primary);">_</span></a>
        </div>
    </nav>

    <div id="error-msg" style="display:none; text-align:center; color:#ff3333; padding:200px 20px; font-family:var(--font-mono);">
        <h2>> ERROR: 404 CASE STUDY NOT FOUND</h2>
        <a href="index.html" class="btn btn-primary" style="margin-top:20px;">Return Home</a>
    </div>

    <div id="case-content" style="display:none;">
        <!-- Hero -->
        <section class="cs-hero">
            <div class="container">
                <a href="index.html" class="cs-back"><i class="fa-solid fa-arrow-left"></i> Back to Portfolio</a>
                <div class="cs-meta" id="cs-meta"></div>
                <h1 class="cs-title" id="cs-title"></h1>
                <p class="cs-summary" id="cs-summary"></p>
                <div id="cs-actions" style="margin-top: 32px; display: flex; gap: 16px; align-items: center;"></div>
            </div>
        </section>

        <!-- Body -->
        <div class="container cs-body">
            <!-- Executive Summary -->
            <div class="cs-section">
                <div class="cs-section-label">Executive Summary</div>
                <div class="cs-highlight">
                    <h4>TL;DR</h4>
                    <p id="cs-tldr"></p>
                </div>
            </div>

            <!-- Dashboard Preview -->
            <div class="cs-section" id="cs-preview-section" style="display: none;">
                <div class="cs-section-label">Dashboard Preview</div>
                <div id="cs-previews" style="display: flex; flex-direction: column; gap: 32px; margin-top: 24px;"></div>
            </div>

            <!-- Key Metrics -->
            <div class="cs-section">
                <div class="cs-section-label">Key Metrics</div>
                <div class="cs-metrics" id="cs-metrics"></div>
            </div>

            <!-- Problem -->
            <div class="cs-section">
                <div class="cs-section-label">The Problem</div>
                <h2 id="cs-problem-title"></h2>
                <p id="cs-problem-text"></p>
                <div class="cs-highlight">
                    <h4>Core Challenge</h4>
                    <p id="cs-challenge"></p>
                </div>
            </div>

            <!-- Methodology -->
            <div class="cs-section">
                <div class="cs-section-label">Methodology</div>
                <h2>How I Solved It</h2>
                <div class="cs-steps" id="cs-steps"></div>
            </div>

            <!-- Impact -->
            <div class="cs-section">
                <div class="cs-section-label">Business Impact</div>
                <div class="cs-highlight green">
                    <h4>Result</h4>
                    <p id="cs-impact"></p>
                </div>
            </div>

            <!-- Tools -->
            <div class="cs-section">
                <div class="cs-section-label">Tools & Technologies</div>
                <div class="cs-tools" id="cs-tools"></div>
            </div>
        </div>

        <!-- CTA -->
        <div class="cs-cta">
            <div class="container">
                <h3>Interested in working together?</h3>
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=tousifraza105@gmail.com" target="_blank" class="btn btn-primary btn-lg">Contact Me</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const projects = [
                {
                    id: 1,
                    title: "Zomato Data Analysis Dashboard",
                    tags: ["DAX", "Python", "Power BI"],
                    theme: "red",
                    category: "FOOD DELIVERY",
                    duration: "4 WEEKS",
                    role: "DATA ANALYST",
                    github: "https://github.com/mdtousifrazaofficial/zomato-data-analysis",
                    summary: "Analyzed Zomato dataset to uncover insights on restaurant performance, customer behavior, and delivery impact using SQL, Python, and Power BI.",
                    tldr: "Identified that the top 20% of restaurants contribute to the majority of revenue and faster delivery significantly improves customer retention, providing data-driven recommendations.",
                    problemTitle: "Optimizing Restaurant & Delivery Performance",
                    problemText: "Understanding restaurant performance and customer behavior is critical for improving business decisions in the food delivery industry. There was a need to analyze complex Zomato data to identify key factors affecting revenue, customer engagement, and delivery efficiency.",
                    challenge: "How can we identify top-performing restaurants, analyze customer engagement patterns, and evaluate the true impact of delivery performance on retention?",
                    steps: [
                        { title: "Data Cleaning & EDA", desc: "Used Python in Jupyter Notebooks to clean the raw dataset, handle missing values, and perform exploratory data analysis." },
                        { title: "SQL Querying", desc: "Wrote PostgreSQL queries to extract key metrics regarding restaurant performance, order frequency, and delivery times." },
                        { title: "Dashboard Creation", desc: "Built a comprehensive Power BI dashboard featuring Overview, Insights, and Recommendations views to visualize the findings." },
                        { title: "Business Strategy", desc: "Formulated actionable recommendations focusing on delivery time improvements, high-performing segments, and pricing strategies." }
                    ],
                    metrics: [
                        { value: "20%", label: "Top Restaurants Revenue" },
                        { value: "100%", label: "Data Pipeline Built" },
                        { value: "3", label: "Dashboard Views" },
                        { value: "3", label: "Core Tools" }
                    ],
                    impact: "Delivered an end-to-end data analysis workflow. Formulated business recommendations to improve delivery time to increase customer retention, focus on high-performing restaurant segments, and optimize pricing strategies for better conversion.",
                    tools: ["DAX", "PostgreSQL", "Python", "Power BI", "Data Visualization"],
                    previews: [
                        "assets/zomato_img/Overview.png",
                        "assets/zomato_img/Insights.png",
                        "assets/zomato_img/Recommendations.png"
                    ]
                },
                {
                    id: 2,
                    title: "APEX MARKETS — Global Stock Intelligence",
                    tags: ["Python", "JavaScript", "Data Analytics"],
                    theme: "purple",
                    category: "FINANCIAL ANALYTICS",
                    duration: "4 WEEKS",
                    role: "DATA ANALYST",
                    github: "https://github.com/mdtousifrazaofficial/APEX-MARKETS-Global-Stock-Intelligence-Dashboard",
                    summary: "A self-contained, interactive financial analytics dashboard built to surface meaningful patterns across 61 global stocks spanning 25 years of trading data.",
                    tldr: "Developed an end-to-end stock market dashboard covering the full analytics lifecycle—from cleaning 307,000+ daily records with Python to building an interactive, dependency-free vanilla JS dashboard.",
                    problemTitle: "Democratizing Financial Analytics",
                    problemText: "The goal was simple: take messy, real-world stock data and turn it into something a portfolio manager, analyst, or curious investor could actually learn from — without needing an expensive BI tool or a subscription.",
                    challenge: "How do we build a robust, interactive dashboard to analyze 25 years of global stock data (61 stocks, 307,000+ rows) without relying on any paid BI tools or complex server backends?",
                    steps: [
                        { title: "Data Cleaning & Prep", desc: "Used Python and Julius AI to handle nulls, normalize types, and validate categorical labels across all records." },
                        { title: "Feature Engineering", desc: "Computed daily percentage returns, annualized volatility scoring, and built per-ticker summary stats (e.g., max drawdown)." },
                        { title: "Exploratory Analysis", desc: "Performed deep EDA on aggregated metrics to uncover patterns in industry concentration and risk-return profiles." },
                        { title: "Dashboard Development", desc: "Built a fully browser-native, custom dark-theme dashboard using HTML5, CSS3, Vanilla JavaScript, and Chart.js." }
                    ],
                    metrics: [
                        { value: "307K+", label: "Data Records" },
                        { value: "61", label: "Global Stocks" },
                        { value: "25 Yrs", label: "Market Data" },
                        { value: "6", label: "Interactive Pages" }
                    ],
                    impact: "Successfully built an open-source, fully browser-native analytical tool replacing traditional BI dashboards. Discovered that volatility does not equate to returns, and volume is largely decoupled from long-term performance.",
                    tools: ["Python", "HTML5", "CSS3", "JavaScript", "Chart.js", "Julius AI", "Claude AI"],
                    previews: [
                        "assets/apex_img/1.png",
                        "assets/apex_img/2.png",
                        "assets/apex_img/3.png",
                        "assets/apex_img/4.png",
                        "assets/apex_img/5.png",
                        "assets/apex_img/6.png",
                        "assets/apex_img/7.png"
                    ]
                }
            ];

            const caseId = parseInt(window.location.hash.replace('#', ''));
            if (!caseId) { document.getElementById('error-msg').style.display = 'block'; return; }

            const project = projects.find(p => p.id === caseId);
            if (!project) { document.getElementById('error-msg').style.display = 'block'; return; }

            document.getElementById('case-content').style.display = 'block';
            document.title = project.title + ' | MD Tousif Raza';

            // Meta
            const metaHTML = `
                <span class="cs-meta-item"><i class="fa-solid fa-folder"></i>${project.category}</span>
                <span class="cs-meta-item"><i class="fa-solid fa-clock"></i>${project.duration}</span>
                <span class="cs-meta-item"><i class="fa-solid fa-user"></i>${project.role}</span>`;
            document.getElementById('cs-meta').innerHTML = metaHTML;

            // Hero
            document.getElementById('cs-title').innerText = project.title;
            document.getElementById('cs-summary').innerText = project.summary;
            if (project.github) {
                document.getElementById('cs-actions').innerHTML = `<a href="${project.github}" target="_blank" class="btn btn-secondary"><i class="fa-brands fa-github"></i> View GitHub Repository</a>`;
            } else {
                document.getElementById('cs-actions').innerHTML = '';
            }

            // TLDR
            document.getElementById('cs-tldr').innerText = project.tldr;

            // Previews
            const previewSection = document.getElementById('cs-preview-section');
            const previewContainer = document.getElementById('cs-previews');
            if (project.previews && project.previews.length > 0) {
                previewSection.style.display = 'block';
                
                let slidesHTML = '';
                let dotsHTML = '';
                
                project.previews.forEach((img, index) => {
                    slidesHTML += `
                        <div class="carousel-slide" style="${index === 0 ? 'display: block;' : 'display: none;'}">
                            <img src="${img}" alt="Dashboard Preview ${index + 1}" style="width: 100%; height: auto; border-radius: 8px; border: 1px solid var(--border-color); box-shadow: var(--shadow-lg);">
                        </div>
                    `;
                    dotsHTML += `
                        <span class="carousel-dot ${index === 0 ? 'active' : ''}" onclick="window.currentCarouselIndex = ${index}; window.updateCarousel()"></span>
                    `;
                });
                
                previewContainer.innerHTML = `
                    <div class="carousel-wrapper" style="position: relative; max-width: 100%; overflow: hidden; border-radius: 8px;">
                        ${slidesHTML}
                        <button class="carousel-btn prev" onclick="window.changeCarousel(-1)">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <button class="carousel-btn next" onclick="window.changeCarousel(1)">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                    <div class="carousel-dots" style="text-align: center; margin-top: 20px;">
                        ${dotsHTML}
                    </div>
                `;
                
                window.currentCarouselIndex = 0;
                window.totalCarouselSlides = project.previews.length;
                window.updateCarousel = function() {
                    const slides = document.querySelectorAll('.carousel-slide');
                    const dots = document.querySelectorAll('.carousel-dot');
                    slides.forEach((slide, i) => slide.style.display = i === window.currentCarouselIndex ? 'block' : 'none');
                    dots.forEach((dot, i) => {
                        if (i === window.currentCarouselIndex) {
                            dot.classList.add('active');
                        } else {
                            dot.classList.remove('active');
                        }
                    });
                };
                window.changeCarousel = function(step) {
                    window.currentCarouselIndex += step;
                    if (window.currentCarouselIndex >= window.totalCarouselSlides) window.currentCarouselIndex = 0;
                    if (window.currentCarouselIndex < 0) window.currentCarouselIndex = window.totalCarouselSlides - 1;
                    window.updateCarousel();
                };
            } else {
                previewSection.style.display = 'none';
                previewContainer.innerHTML = '';
            }

            // Metrics
            const metricsContainer = document.getElementById('cs-metrics');
            project.metrics.forEach(m => {
                metricsContainer.innerHTML += `<div class="cs-metric"><div class="cs-metric-val">${m.value}</div><div class="cs-metric-label">${m.label}</div></div>`;
            });

            // Problem
            document.getElementById('cs-problem-title').innerText = project.problemTitle;
            document.getElementById('cs-problem-text').innerText = project.problemText;
            document.getElementById('cs-challenge').innerText = project.challenge;

            // Steps
            const stepsContainer = document.getElementById('cs-steps');
            project.steps.forEach((s, i) => {
                stepsContainer.innerHTML += `<div class="cs-step"><div class="cs-step-num">0${i+1}</div><div class="cs-step-content"><h4>${s.title}</h4><p>${s.desc}</p></div></div>`;
            });

            // Impact
            document.getElementById('cs-impact').innerText = project.impact;

            // Tools
            const toolsContainer = document.getElementById('cs-tools');
            project.tools.forEach(t => {
                toolsContainer.innerHTML += `<span class="cs-tool">${t}</span>`;
            });
        });
    </script>
</body>
</html>
