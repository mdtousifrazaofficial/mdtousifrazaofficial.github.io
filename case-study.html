<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study | MD Tousif Raza</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/motion.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Case Study Hero */
        .cs-hero { padding: 140px 0 60px; border-bottom: 1px solid var(--border-color); }
        .cs-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .cs-meta-item { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .cs-meta-item i { color: var(--accent-primary); margin-right: 6px; }
        .cs-title { font-size: clamp(2rem, 4vw, 3.2rem); margin-bottom: 20px; line-height: 1.2; }
        .cs-summary { font-size: 1.15rem; color: var(--text-secondary); max-width: 700px; line-height: 1.8; }

        /* Case Study Body */
        .cs-body { max-width: 820px; margin: 0 auto; padding: 80px 0 100px; }

        /* Section Block */
        .cs-section { margin-bottom: 64px; }
        .cs-section-label { font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent-primary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .cs-section-label::before { content: '>'; }
        .cs-section h2 { font-size: 1.6rem; margin-bottom: 20px; }
        .cs-section p { font-size: 1.05rem; color: var(--text-secondary); line-height: 1.9; margin-bottom: 16px; }

        /* Highlight Box */
        .cs-highlight { background: var(--bg-card); border: 1px solid var(--border-color); border-left: 4px solid var(--accent-primary); padding: 32px; margin: 32px 0; }
        .cs-highlight.green { border-left-color: var(--accent-teal); }
        .cs-highlight h4 { font-family: var(--font-mono); font-size: 0.9rem; color: var(--accent-primary); margin-bottom: 12px; text-transform: uppercase; }
        .cs-highlight.green h4 { color: var(--accent-teal); }
        .cs-highlight p { margin-bottom: 0; }

        /* Metrics Row */
        .cs-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 24px; margin: 40px 0; }
        .cs-metric { background: var(--bg-card); border: 1px solid var(--border-color); border-top: 2px solid var(--accent-primary); padding: 24px; text-align: center; }
        .cs-metric-val { font-family: var(--font-mono); font-size: 2rem; font-weight: 800; color: var(--accent-primary); margin-bottom: 8px; }
        .cs-metric-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-family: var(--font-mono); letter-spacing: 0.05em; }

        /* Tools Used */
        .cs-tools { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
        .cs-tool { font-family: var(--font-mono); font-size: 0.85rem; padding: 8px 16px; border: 1px solid var(--border-color); color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.05em; }

        /* Process Steps */
        .cs-steps { counter-reset: step; margin: 32px 0; }
        .cs-step { display: flex; gap: 20px; margin-bottom: 28px; align-items: flex-start; }
        .cs-step-num { font-family: var(--font-mono); font-size: 1.4rem; font-weight: 800; color: var(--accent-primary); min-width: 40px; line-height: 1; padding-top: 4px; }
        .cs-step-content h4 { font-size: 1.05rem; margin-bottom: 6px; }
        .cs-step-content p { font-size: 0.95rem; margin-bottom: 0; }

        /* Back Button */
        .cs-back { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); color: var(--text-primary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 0; transition: color 0.3s; }
        .cs-back:hover { color: var(--accent-primary); }

        /* Bottom CTA */
        .cs-cta { text-align: center; padding: 80px 0; border-top: 1px solid var(--border-color); }
        .cs-cta h3 { font-size: 1.5rem; margin-bottom: 24px; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo glitch-hover">Md Tousif Raza <span class="blink" style="color: var(--accent-primary);">_</span></a>
        </div>
    </nav>

    <div id="error-msg" style="display:none; text-align:center; color:#ff3333; padding:200px 20px; font-family:var(--font-mono);">
        <h2>> ERROR: 404 CASE STUDY NOT FOUND</h2>
        <a href="index.html" class="btn btn-primary" style="margin-top:20px;">Return Home</a>
    </div>

    <div id="case-content" style="display:none;">
        <!-- Hero -->
        <section class="cs-hero">
            <div class="container">
                <a href="index.html" class="cs-back"><i class="fa-solid fa-arrow-left"></i> Back to Portfolio</a>
                <div class="cs-meta" id="cs-meta"></div>
                <h1 class="cs-title" id="cs-title"></h1>
                <p class="cs-summary" id="cs-summary"></p>
            </div>
        </section>

        <!-- Body -->
        <div class="container cs-body">
            <!-- Executive Summary -->
            <div class="cs-section">
                <div class="cs-section-label">Executive Summary</div>
                <div class="cs-highlight">
                    <h4>TL;DR</h4>
                    <p id="cs-tldr"></p>
                </div>
            </div>

            <!-- Key Metrics -->
            <div class="cs-section">
                <div class="cs-section-label">Key Metrics</div>
                <div class="cs-metrics" id="cs-metrics"></div>
            </div>

            <!-- Problem -->
            <div class="cs-section">
                <div class="cs-section-label">The Problem</div>
                <h2 id="cs-problem-title"></h2>
                <p id="cs-problem-text"></p>
                <div class="cs-highlight">
                    <h4>Core Challenge</h4>
                    <p id="cs-challenge"></p>
                </div>
            </div>

            <!-- Methodology -->
            <div class="cs-section">
                <div class="cs-section-label">Methodology</div>
                <h2>How I Solved It</h2>
                <div class="cs-steps" id="cs-steps"></div>
            </div>

            <!-- Impact -->
            <div class="cs-section">
                <div class="cs-section-label">Business Impact</div>
                <div class="cs-highlight green">
                    <h4>Result</h4>
                    <p id="cs-impact"></p>
                </div>
            </div>

            <!-- Tools -->
            <div class="cs-section">
                <div class="cs-section-label">Tools & Technologies</div>
                <div class="cs-tools" id="cs-tools"></div>
            </div>
        </div>

        <!-- CTA -->
        <div class="cs-cta">
            <div class="container">
                <h3>Interested in working together?</h3>
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=tousifraza105@gmail.com" target="_blank" class="btn btn-primary btn-lg">Contact Me</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const projects = [
                {
                    id: 1,
                    title: "Credit Risk & Loan Default Prediction",
                    tags: ["SQL", "Python", "Power BI"],
                    theme: "blue",
                    category: "FINTECH",
                    duration: "4 WEEKS",
                    role: "DATA ANALYST",
                    summary: "Analyzed 50,000+ loan records for a Fintech NBFC to identify high-risk borrower segments and build a predictive model that could reduce Non-Performing Assets by 11%.",
                    tldr: "Built a behavioral risk scoring model using Random Forest that identified the top 3 high-risk borrower segments, enabling proactive collection strategies and demonstrating an 11% NPA reduction potential.",
                    problemTitle: "Rising NPAs Threatening Portfolio Health",
                    problemText: "A mid-size Fintech NBFC was facing a critical 14% NPA (Non-Performing Asset) rate across its unsecured lending portfolio. Traditional rule-based credit scoring was failing to catch emerging risk patterns, and the company needed a data-driven approach without overhauling their core ML infrastructure.",
                    challenge: "The core question was: Can we identify which borrower segments are most likely to default BEFORE they miss their first EMI, using only existing transactional and demographic data?",
                    steps: [
                        { title: "Data Extraction & Cleaning", desc: "Extracted 50K+ loan records from PostgreSQL. Cleaned missing values, handled outliers in income and loan amount fields, and standardized categorical variables." },
                        { title: "Feature Engineering", desc: "Created 12 derived features including debt-to-income ratio, payment regularity score, and employment stability index from raw transactional data." },
                        { title: "Model Development", desc: "Built a Random Forest classifier in Python (scikit-learn) with 78% accuracy. Used SHAP values to identify the top 5 risk-driving features." },
                        { title: "Dashboard & Reporting", desc: "Deployed findings into a Power BI dashboard with segment-level drill-downs, enabling the collections team to prioritize high-risk accounts." }
                    ],
                    metrics: [
                        { value: "50K+", label: "Records Analyzed" },
                        { value: "11%", label: "NPA Reduction" },
                        { value: "78%", label: "Model Accuracy" },
                        { value: "12", label: "Features Built" }
                    ],
                    impact: "The predictive model successfully identified 3 high-risk borrower segments that accounted for 62% of all defaults. This enabled the team to design targeted pre-delinquency interventions, demonstrating a potential 11% reduction in NPA rate — translating to significant portfolio savings.",
                    tools: ["PostgreSQL", "Python", "Pandas", "Scikit-learn", "SHAP", "Power BI"]
                },
                {
                    id: 2,
                    title: "E-Commerce Funnel & Revenue Leakage Analysis",
                    tags: ["SQL", "Tableau", "Funnel Analysis"],
                    theme: "orange",
                    category: "E-COMMERCE",
                    duration: "3 WEEKS",
                    role: "DATA ANALYST",
                    summary: "Diagnosed a stagnant checkout conversion rate despite 40% YoY traffic growth by mapping the complete user funnel and identifying ₹2.3Cr/month in revenue leakage.",
                    tldr: "Used advanced SQL window functions to map the complete user journey from product view to checkout, uncovering that 68% of cart abandonment happened at the payment gateway step — leading to a targeted UI redesign recommendation.",
                    problemTitle: "Traffic Up, Revenue Flat",
                    problemText: "An e-commerce platform had invested heavily in marketing, achieving a 40% year-over-year increase in website traffic. However, checkout conversion rates remained stagnant at 2.1%, indicating severe revenue leakage somewhere in the purchase funnel.",
                    challenge: "Where exactly in the user journey are potential customers dropping off, and what is the estimated revenue impact of each drop-off point?",
                    steps: [
                        { title: "Funnel Mapping with SQL", desc: "Wrote complex SQL window functions (LAG, LEAD, ROW_NUMBER) to reconstruct individual user journeys across View → Cart → Checkout → Payment stages." },
                        { title: "Drop-off Analysis", desc: "Calculated stage-wise conversion rates and identified the payment gateway as the primary bottleneck with a 68% abandonment rate." },
                        { title: "Cohort Segmentation", desc: "Segmented users by device type, traffic source, and time-of-day to find that mobile users from paid ads had 3x higher drop-off rates." },
                        { title: "Revenue Impact Modeling", desc: "Built a revenue simulation model estimating ₹2.3Cr/month in recoverable leakage if payment-stage UX was optimized." }
                    ],
                    metrics: [
                        { value: "₹2.3Cr", label: "Revenue Leakage" },
                        { value: "68%", label: "Payment Drop-off" },
                        { value: "40%", label: "Traffic Growth" },
                        { value: "3x", label: "Mobile Drop-off" }
                    ],
                    impact: "Formulated a data-backed UI redesign strategy targeting the payment gateway step. The analysis showed that simplifying the checkout from 4 steps to 2, and adding UPI as a primary option, could recover up to ₹2.3Cr/month in lost revenue — a recommendation presented with full supporting data.",
                    tools: ["MySQL", "SQL Window Functions", "Tableau", "Excel", "Google Analytics"]
                },
                {
                    id: 3,
                    title: "SaaS Customer Churn Prediction System",
                    tags: ["Python", "Power BI", "Predictive Modeling"],
                    theme: "green",
                    category: "B2B SAAS",
                    duration: "5 WEEKS",
                    role: "DATA ANALYST",
                    summary: "Built an early-warning churn prediction system for a B2B SaaS platform that could identify 73% of at-risk accounts 30 days before cancellation.",
                    tldr: "Developed an Account Health Score combining login frequency, feature adoption, and support ticket patterns to predict churn 30 days in advance with 73% recall, enabling proactive customer success interventions.",
                    problemTitle: "Unsustainable Monthly Churn Rate",
                    problemText: "A B2B SaaS platform serving 2,000+ enterprise accounts was experiencing a 5.2% monthly churn rate — well above the industry benchmark of 3%. The Customer Success team was reactive, only engaging after cancellation requests were filed.",
                    challenge: "Can we build a system that flags at-risk accounts BEFORE they decide to churn, giving the CS team a 30-day intervention window?",
                    steps: [
                        { title: "Behavioral Data Analysis", desc: "Analyzed 6 months of login frequency, feature usage depth, and support ticket sentiment for 2,000+ accounts using Python (Pandas)." },
                        { title: "Health Score Engineering", desc: "Created a composite Account Health Score (0-100) combining 8 behavioral signals including DAU/MAU ratio, feature breadth, and NPS responses." },
                        { title: "Churn Prediction Model", desc: "Built a Logistic Regression model achieving 73% recall on at-risk accounts, meaning it correctly flagged 3 out of 4 future churners." },
                        { title: "Power BI Alert Dashboard", desc: "Deployed the Health Score into a Power BI dashboard with automated alerts when accounts dropped below the critical threshold of 40." }
                    ],
                    metrics: [
                        { value: "73%", label: "Churn Recall" },
                        { value: "30d", label: "Early Warning" },
                        { value: "2K+", label: "Accounts Tracked" },
                        { value: "8", label: "Health Signals" }
                    ],
                    impact: "Prototyped an early-warning system that could identify 73% of at-risk accounts a full 30 days before cancellation. The Account Health Score dashboard gave the CS team a prioritized list of accounts needing immediate intervention, with the potential to reduce monthly churn from 5.2% to under 3.5%.",
                    tools: ["Python", "Pandas", "NumPy", "Scikit-learn", "Power BI", "DAX"]
                }
            ];

            const caseId = parseInt(window.location.hash.replace('#', ''));
            if (!caseId) { document.getElementById('error-msg').style.display = 'block'; return; }

            const project = projects.find(p => p.id === caseId);
            if (!project) { document.getElementById('error-msg').style.display = 'block'; return; }

            document.getElementById('case-content').style.display = 'block';
            document.title = project.title + ' | MD Tousif Raza';

            // Meta
            const metaHTML = `
                <span class="cs-meta-item"><i class="fa-solid fa-folder"></i>${project.category}</span>
                <span class="cs-meta-item"><i class="fa-solid fa-clock"></i>${project.duration}</span>
                <span class="cs-meta-item"><i class="fa-solid fa-user"></i>${project.role}</span>`;
            document.getElementById('cs-meta').innerHTML = metaHTML;

            // Hero
            document.getElementById('cs-title').innerText = project.title;
            document.getElementById('cs-summary').innerText = project.summary;

            // TLDR
            document.getElementById('cs-tldr').innerText = project.tldr;

            // Metrics
            const metricsContainer = document.getElementById('cs-metrics');
            project.metrics.forEach(m => {
                metricsContainer.innerHTML += `<div class="cs-metric"><div class="cs-metric-val">${m.value}</div><div class="cs-metric-label">${m.label}</div></div>`;
            });

            // Problem
            document.getElementById('cs-problem-title').innerText = project.problemTitle;
            document.getElementById('cs-problem-text').innerText = project.problemText;
            document.getElementById('cs-challenge').innerText = project.challenge;

            // Steps
            const stepsContainer = document.getElementById('cs-steps');
            project.steps.forEach((s, i) => {
                stepsContainer.innerHTML += `<div class="cs-step"><div class="cs-step-num">0${i+1}</div><div class="cs-step-content"><h4>${s.title}</h4><p>${s.desc}</p></div></div>`;
            });

            // Impact
            document.getElementById('cs-impact').innerText = project.impact;

            // Tools
            const toolsContainer = document.getElementById('cs-tools');
            project.tools.forEach(t => {
                toolsContainer.innerHTML += `<span class="cs-tool">${t}</span>`;
            });
        });
    </script>
</body>
</html>
